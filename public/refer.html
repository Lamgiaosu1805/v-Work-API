<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tải ứng dụng</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f5f5f5;
      }
      .card {
        background: white;
        border-radius: 16px;
        padding: 2rem;
        text-align: center;
        max-width: 360px;
        width: 90%;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
      }
      h2 {
        font-size: 20px;
        margin-bottom: 0.5rem;
      }
      p {
        color: #666;
        font-size: 14px;
        margin-bottom: 1.5rem;
      }
      .spinner {
        width: 36px;
        height: 36px;
        border: 3px solid #eee;
        border-top-color: #007aff;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 0 auto 1.25rem;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="spinner"></div>
      <h2 id="title">Đang mở ứng dụng...</h2>
      <p id="msg">Vui lòng chờ trong giây lát</p>
    </div>

    <script>
      const STORE_IOS = "https://apps.apple.com/us/app/tikluy/id6504506939"; // thay link thật
      const STORE_ANDROID =
        "https://play.google.com/store/apps/details?id=com.tikluy"; // thay link thật

      const params = new URLSearchParams(window.location.search);
      const ref = params.get("ref");
      const ua = navigator.userAgent;

      const isIOS = /iPhone|iPad|iPod/.test(ua);
      const isAndroid = /Android/.test(ua);

      // Bước 1: Lưu fingerprint lên server
      fetch("/referral/track", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          fingerprint: {
            userAgent: ua,
            screen: `${screen.width}x${screen.height}`,
            timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
          },
          ref,
        }),
      });

      // Bước 2: Thử mở app nếu đã cài
      if (ref) {
        window.location.href = `tikluy://open-account?ref=${ref}`;
      }

      // Bước 3: Sau 2 giây tự redirect sang store đúng nền tảng
      setTimeout(() => {
        if (isIOS) {
          document.getElementById("title").textContent =
            "Đang chuyển đến App Store...";
          document.getElementById("msg").textContent =
            "Tải ứng dụng để tiếp tục đăng ký";
          window.location.href = STORE_IOS;
        } else if (isAndroid) {
          document.getElementById("title").textContent =
            "Đang chuyển đến Google Play...";
          document.getElementById("msg").textContent =
            "Tải ứng dụng để tiếp tục đăng ký";
          window.location.href = STORE_ANDROID;
        } else {
          // Trường hợp mở trên máy tính / không xác định được
          document.getElementById("title").textContent =
            "Quét mã bằng điện thoại";
          document.getElementById("msg").textContent =
            "Vui lòng dùng điện thoại iOS hoặc Android để quét mã QR này";
        }
      }, 2000);
    </script>
  </body>
</html>
