<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tải ứng dụng</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f5f5f5;
      }
      .card {
        background: white;
        border-radius: 16px;
        padding: 2rem;
        text-align: center;
        max-width: 360px;
        width: 90%;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
      }
      h2 {
        font-size: 20px;
        margin-bottom: 0.5rem;
      }
      p {
        color: #666;
        font-size: 14px;
        margin-bottom: 1.5rem;
      }
      .spinner {
        width: 36px;
        height: 36px;
        border: 3px solid #eee;
        border-top-color: #007aff;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 0 auto 1.25rem;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .btn {
        display: inline-block;
        width: 100%;
        padding: 0.85rem;
        border-radius: 10px;
        border: none;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        text-decoration: none;
        color: white;
        margin-top: 0.5rem;
      }
      .btn-primary {
        background: #007aff;
      }
      .btn-android {
        background: #34a853;
      }
      .btn-secondary {
        background: white;
        color: #007aff;
        border: 1.5px solid #007aff;
        margin-top: 0.5rem;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="spinner" id="spinner"></div>
      <h2 id="title">Đang chuẩn bị...</h2>
      <p id="msg">Vui lòng chờ trong giây lát</p>

      <!-- Nút mở app (nếu đã cài) -->
      <a id="btn-open" class="btn btn-primary" style="display: none" href="#"
        >Mở ứng dụng</a
      >
      <!-- Nút tải app (nếu chưa cài) -->
      <a id="btn-store" class="btn btn-primary" style="display: none" href="#"
        >Tải ứng dụng</a
      >
      <!-- Nút tải dự phòng sau khi đã thử mở -->
      <a
        id="btn-download"
        class="btn btn-secondary"
        style="display: none"
        href="#"
        >Tải ứng dụng về máy</a
      >
    </div>

    <script>
      const STORE_IOS = "https://apps.apple.com/us/app/tikluy/id6504506939";
      const STORE_ANDROID =
        "https://play.google.com/store/apps/details?id=com.tikluy";
      const DEEP_LINK = "tikluy://open-account";

      const params = new URLSearchParams(window.location.search);
      const ref = params.get("ref");
      const type = params.get("type");
      const ua = navigator.userAgent;
      const isIOS = /iPhone|iPad|iPod/.test(ua);
      const isAndroid = /Android/.test(ua);

      let savedToken = null;
      let appOpened = false; // flag để biết app đã mở chưa

      const storeUrl = isIOS ? STORE_IOS : STORE_ANDROID;
      const deepLink = ref
        ? `${DEEP_LINK}?ref=${ref}&type=${type ?? ""}`
        : DEEP_LINK;

      // Ghi token vào clipboard
      async function copyToken() {
        if (!savedToken) return;
        try {
          await navigator.clipboard.writeText(`tikluy_ref:${savedToken}`);
        } catch (e) {
          console.log("Clipboard write failed:", e);
        }
      }

      // Thử mở app — theo dõi xem có mở được không
      function tryOpenApp() {
        if (!ref) return;

        // Lắng nghe sự kiện blur — nếu trang bị blur = app đã mở
        const onBlur = () => {
          appOpened = true;
          window.removeEventListener("blur", onBlur);
        };
        window.addEventListener("blur", onBlur);

        // Redirect sang deep link
        window.location.href = deepLink;

        // Sau 2.5 giây nếu vẫn còn ở trang web = chưa cài app
        setTimeout(() => {
          window.removeEventListener("blur", onBlur);
          if (!appOpened) {
            showDownloadUI();
          }
        }, 2500);
      }

      // Hiện UI khi chưa cài app
      async function showDownloadUI() {
        document.getElementById("spinner").style.display = "none";
        document.getElementById("title").textContent =
          "Tải ứng dụng để tiếp tục";
        document.getElementById("msg").textContent =
          "Nhấn nút bên dưới để tải TikLuy về điện thoại của bạn";

        const btnStore = document.getElementById("btn-store");
        btnStore.textContent = isIOS
          ? "Tải trên App Store"
          : "Tải trên Google Play";
        btnStore.className = `btn ${isIOS ? "btn-primary" : "btn-android"}`;
        btnStore.style.display = "block";

        btnStore.addEventListener("click", async (e) => {
          e.preventDefault();
          await copyToken(); // copy token trước khi sang store
          window.location.href = storeUrl;
        });
      }

      // Hiện UI khi đã cài app
      function showOpenUI() {
        document.getElementById("spinner").style.display = "none";
        document.getElementById("title").textContent = "Mở ứng dụng TikLuy";
        document.getElementById("msg").textContent =
          "Nhấn nút bên dưới để mở ứng dụng";

        const btnOpen = document.getElementById("btn-open");
        btnOpen.style.display = "block";
        btnOpen.addEventListener("click", (e) => {
          e.preventDefault();
          window.location.href = deepLink;
        });

        // Hiện thêm nút tải dự phòng — phòng trường hợp app bị gỡ
        const btnDownload = document.getElementById("btn-download");
        btnDownload.style.display = "block";
        btnDownload.href = storeUrl;
      }

      async function init() {
        // Bước 1: Gọi track → nhận token
        try {
          const res = await fetch("/referral/track", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ ref, type }),
          });
          const data = await res.json();
          savedToken = data.token ?? null;
        } catch (e) {
          console.log("Track error:", e);
        }

        // Bước 2: Xử lý theo nền tảng
        if (!isIOS && !isAndroid) {
          // PC → hiện thông báo dùng điện thoại
          document.getElementById("spinner").style.display = "none";
          document.getElementById("title").textContent =
            "Quét mã bằng điện thoại";
          document.getElementById("msg").textContent =
            "Vui lòng dùng điện thoại để quét mã QR này";
          return;
        }

        if (!ref) {
          // Không có ref → chỉ hiện nút tải
          showDownloadUI();
          return;
        }

        // Có ref → thử mở app
        // Hiện UI mở app trước để user thấy đang xử lý
        showOpenUI();

        // Thử mở app — nếu không mở được sau 2.5s thì chuyển sang UI tải
        tryOpenApp();
      }

      init();
    </script>
  </body>
</html>
