<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tải ứng dụng</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f5f5f5;
      }
      .card {
        background: white;
        border-radius: 16px;
        padding: 2rem;
        text-align: center;
        max-width: 360px;
        width: 90%;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
      }
      h2 {
        font-size: 20px;
        margin-bottom: 0.5rem;
      }
      p {
        color: #666;
        font-size: 14px;
        margin-bottom: 1.5rem;
      }
      .spinner {
        width: 36px;
        height: 36px;
        border: 3px solid #eee;
        border-top-color: #007aff;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 0 auto 1.25rem;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="spinner" id="spinner"></div>
      <h2 id="title">Đang mở ứng dụng...</h2>
      <p id="msg">Vui lòng chờ trong giây lát</p>
    </div>

    <script>
      const STORE_IOS = "https://apps.apple.com/app/idXXXXXXX";
      const STORE_ANDROID =
        "https://play.google.com/store/apps/details?id=com.yourapp";

      const params = new URLSearchParams(window.location.search);
      const ref = params.get("ref");
      const ua = navigator.userAgent;
      const isIOS = /iPhone|iPad|iPod/.test(ua);
      const isAndroid = /Android/.test(ua);

      async function init() {
        try {
          // Bước 1: Gọi track → nhận token 1 lần duy nhất cho lần quét này
          const res = await fetch("/referral/track", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ ref }),
          });
          const data = await res.json();
          const token = data.token;

          // Bước 2: Ghi token vào clipboard
          if (token) {
            try {
              await navigator.clipboard.writeText(`tikluy_ref:${token}`);
            } catch (e) {
              console.log("Clipboard write failed:", e);
            }
          }
        } catch (e) {
          console.log("Track error:", e);
        }

        // Bước 3: Thử mở app nếu đã cài (deep link)
        if (ref) {
          window.location.href = `tikluy://open-account?ref=${ref}`;
        }

        // Bước 4: Sau 2 giây tự redirect sang store đúng nền tảng
        setTimeout(() => {
          if (isIOS) {
            window.location.href = STORE_IOS;
          } else if (isAndroid) {
            window.location.href = STORE_ANDROID;
          } else {
            document.getElementById("spinner").style.display = "none";
            document.getElementById("title").textContent =
              "Quét mã bằng điện thoại";
            document.getElementById("msg").textContent =
              "Vui lòng dùng điện thoại để quét mã QR này";
          }
        }, 2000);
      }

      init();
    </script>
  </body>
</html>
