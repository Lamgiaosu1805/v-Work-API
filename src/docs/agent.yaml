paths:
  /agents/upsert:
    post:
      tags: [Agent]
      summary: Tạo / cập nhật đại lý (app nội bộ)
      description: Xác thực qua API key + IP whitelist (verifyInternalRequest), không dùng Bearer token.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Thông tin đại lý từ hệ thống ngoài (kèm app_code)
      responses:
        "200": { description: Upsert thành công }
        "400": { description: Lỗi dữ liệu đầu vào }
        "404": { description: App không tồn tại hoặc đã bị khóa }

  /agents/{agent_code}/qr:
    get:
      tags: [Agent]
      summary: Sinh QR cho đại lý (app nội bộ)
      description: Xác thực qua API key + IP whitelist.
      security: []
      parameters:
        - in: path
          name: agent_code
          required: true
          schema: { type: string }
        - in: query
          name: app_code
          required: true
          schema: { type: string }
      responses:
        "200": { description: QR code }
        "400": { description: Thiếu app_code }
        "404": { description: App / đại lý không tồn tại }

  /agents:
    get:
      tags: [Agent]
      summary: Danh sách đại lý (manager CRM)
      responses:
        "200": { description: Danh sách đại lý }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
