paths:
  /ai/customer/{customerId}/summary:
    get:
      tags: [AI]
      summary: Tóm tắt khách hàng bằng AI (CRM)
      parameters:
        - { in: path, name: customerId, required: true, schema: { type: string } }
      responses:
        "200": { description: Bản tóm tắt khách hàng }
        "400": { $ref: "#/components/responses/InvalidId" }
        "404": { $ref: "#/components/responses/NotFound" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /ai/churn-risks:
    get:
      tags: [AI]
      summary: Danh sách khách hàng có nguy cơ rời bỏ (CRM)
      responses:
        "200": { description: Danh sách churn risk }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /ai/chat:
    post:
      tags: [AI]
      summary: Chat với trợ lý AI (CRM)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [messages]
              properties:
                messages:
                  type: array
                  items:
                    type: object
                    properties:
                      role: { type: string, enum: [user, assistant] }
                      content: { type: string }
      responses:
        "200": { description: Phản hồi từ AI }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
