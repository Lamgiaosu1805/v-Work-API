paths:
  /branch/getAll:
    get:
      tags: [Branch]
      summary: Danh sách chi nhánh
      responses:
        "200": { description: Danh sách chi nhánh }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /branch/create:
    post:
      tags: [Branch]
      summary: Tạo chi nhánh (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [branch_name, branch_code]
              properties:
                branch_name: { type: string }
                branch_code: { type: string }
                address: { type: string }
      responses:
        "201": { description: Tạo thành công }
        "400": { description: Tên và mã chi nhánh là bắt buộc }
        "409": { description: Mã chi nhánh đã tồn tại }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /branch/update/{id}:
    put:
      tags: [Branch]
      summary: Cập nhật chi nhánh (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                branch_name: { type: string }
                branch_code: { type: string }
                address: { type: string }
                is_active: { type: boolean }
      responses:
        "200": { description: Cập nhật thành công }
        "400": { description: ID không hợp lệ / field rỗng }
        "404": { description: Chi nhánh không tồn tại }
        "409": { description: Mã chi nhánh đã tồn tại }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /branch/delete/{id}:
    delete:
      tags: [Branch]
      summary: Xóa chi nhánh (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200": { description: Xóa thành công }
        "400": { description: ID không hợp lệ }
        "404": { description: Chi nhánh không tồn tại }
        "409": { description: Chi nhánh đang được sử dụng }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
