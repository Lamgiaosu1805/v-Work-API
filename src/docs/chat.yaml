paths:
  /chat/users/search:
    get:
      tags: [Chat]
      summary: Tìm người dùng để nhắn tin
      parameters:
        - { in: query, name: q, schema: { type: string } }
      responses:
        "200": { description: Danh sách người dùng }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /chat/private:
    post:
      tags: [Chat]
      summary: Tạo / mở hội thoại riêng tư
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [receiver_id]
              properties:
                receiver_id: { type: string, description: "UserInfo id người nhận" }
      responses:
        "200": { description: Hội thoại riêng tư }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /chat/group:
    post:
      tags: [Chat]
      summary: Tạo nhóm chat
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, members]
              properties:
                name: { type: string }
                members: { type: array, items: { type: string } }
      responses:
        "201": { description: Tạo nhóm thành công }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /chat/conversations:
    get:
      tags: [Chat]
      summary: Danh sách hội thoại của tôi
      responses:
        "200": { description: Danh sách hội thoại }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /chat/conversations/{conversationId}:
    get:
      tags: [Chat]
      summary: Chi tiết hội thoại
      parameters:
        - { in: path, name: conversationId, required: true, schema: { type: string } }
      responses:
        "200": { description: Chi tiết hội thoại }
        "400": { $ref: "#/components/responses/InvalidId" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    delete:
      tags: [Chat]
      summary: Xóa hội thoại
      parameters:
        - { in: path, name: conversationId, required: true, schema: { type: string } }
      responses:
        "200": { description: Xóa thành công }
        "400": { $ref: "#/components/responses/InvalidId" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /chat/conversations/{conversationId}/messages:
    get:
      tags: [Chat]
      summary: Danh sách tin nhắn
      parameters:
        - { in: path, name: conversationId, required: true, schema: { type: string } }
      responses:
        "200": { description: Danh sách tin nhắn }
        "400": { $ref: "#/components/responses/InvalidId" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      tags: [Chat]
      summary: Gửi tin nhắn (kèm ảnh tùy chọn)
      parameters:
        - { in: path, name: conversationId, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                content: { type: string }
                type: { type: string }
                clientMessageId: { type: string }
                image: { type: string, format: binary }
      responses:
        "201": { description: Gửi tin nhắn thành công }
        "400": { $ref: "#/components/responses/InvalidId" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /chat/conversations/{conversationId}/messages/{messageId}/image:
    get:
      tags: [Chat]
      summary: Xem ảnh trong tin nhắn
      parameters:
        - { in: path, name: conversationId, required: true, schema: { type: string } }
        - { in: path, name: messageId, required: true, schema: { type: string } }
      responses:
        "200": { description: Ảnh tin nhắn }
        "400": { $ref: "#/components/responses/InvalidId" }
        "404": { $ref: "#/components/responses/NotFound" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /chat/conversations/{conversationId}/group-name:
    patch:
      tags: [Chat]
      summary: Đổi tên nhóm
      parameters:
        - { in: path, name: conversationId, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
      responses:
        "200": { description: Đổi tên thành công }
        "400": { $ref: "#/components/responses/InvalidId" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /chat/conversations/{conversationId}/members:
    post:
      tags: [Chat]
      summary: Thêm thành viên vào nhóm
      parameters:
        - { in: path, name: conversationId, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [member_ids]
              properties:
                member_ids: { type: array, items: { type: string } }
      responses:
        "200": { description: Thêm thành viên thành công }
        "400": { $ref: "#/components/responses/InvalidId" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /chat/conversations/{conversationId}/members/me:
    delete:
      tags: [Chat]
      summary: Rời nhóm
      parameters:
        - { in: path, name: conversationId, required: true, schema: { type: string } }
      responses:
        "200": { description: Đã rời nhóm }
        "400": { $ref: "#/components/responses/InvalidId" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /chat/conversations/{conversationId}/members/{memberId}:
    delete:
      tags: [Chat]
      summary: Kick thành viên khỏi nhóm
      parameters:
        - { in: path, name: conversationId, required: true, schema: { type: string } }
        - { in: path, name: memberId, required: true, schema: { type: string } }
      responses:
        "200": { description: Đã kick thành viên }
        "400": { $ref: "#/components/responses/InvalidId" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /chat/conversations/{conversationId}/members/{memberId}/promote:
    patch:
      tags: [Chat]
      summary: Phong thành viên làm quản trị nhóm
      parameters:
        - { in: path, name: conversationId, required: true, schema: { type: string } }
        - { in: path, name: memberId, required: true, schema: { type: string } }
      responses:
        "200": { description: Đã phong quản trị }
        "400": { $ref: "#/components/responses/InvalidId" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /chat/conversations/{conversationId}/messages/{messageId}:
    delete:
      tags: [Chat]
      summary: Thu hồi tin nhắn (cho mọi người)
      parameters:
        - { in: path, name: conversationId, required: true, schema: { type: string } }
        - { in: path, name: messageId, required: true, schema: { type: string } }
      responses:
        "200": { description: Đã thu hồi }
        "400": { $ref: "#/components/responses/InvalidId" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /chat/conversations/{conversationId}/messages/{messageId}/self:
    delete:
      tags: [Chat]
      summary: Xóa tin nhắn ở phía mình
      parameters:
        - { in: path, name: conversationId, required: true, schema: { type: string } }
        - { in: path, name: messageId, required: true, schema: { type: string } }
      responses:
        "200": { description: Đã xóa phía mình }
        "400": { $ref: "#/components/responses/InvalidId" }
        "401": { $ref: "#/components/responses/Unauthorized" }
