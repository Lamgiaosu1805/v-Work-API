paths:
  /customer-claim-request:
    post:
      tags: [Customer Claim Request]
      summary: Gửi yêu cầu nhận khách hàng (CRM)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [app_code, phone_number]
              properties:
                app_code: { type: string }
                phone_number: { type: string }
                note: { type: string }
      responses:
        "201": { description: Đã gửi yêu cầu }
        "400": { description: Thiếu app_code hoặc phone_number }
        "403": { description: Không đủ quyền }
        "404": { description: App / khách hàng không tồn tại }
        "409": { description: Đã có yêu cầu / khách hàng đã có sale }
        "401": { $ref: "#/components/responses/Unauthorized" }
    get:
      tags: [Customer Claim Request]
      summary: Danh sách yêu cầu (manager CRM)
      parameters:
        - in: query
          name: status
          schema: { type: string, default: pending }
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
        - in: query
          name: search
          schema: { type: string }
      responses:
        "200": { description: Danh sách yêu cầu }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /customer-claim-request/mine:
    get:
      tags: [Customer Claim Request]
      summary: Yêu cầu của tôi (CRM)
      parameters:
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
      responses:
        "200": { description: Danh sách yêu cầu của tôi }
        "404": { description: Không tìm thấy thông tin nhân viên }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /customer-claim-request/{id}/approve:
    patch:
      tags: [Customer Claim Request]
      summary: Duyệt yêu cầu (manager CRM)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200": { description: Đã duyệt }
        "404": { description: Không tìm thấy yêu cầu / khách hàng }
        "409": { description: Khách hàng đã có sale phụ trách }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /customer-claim-request/{id}/reject:
    patch:
      tags: [Customer Claim Request]
      summary: Từ chối yêu cầu (manager CRM)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200": { description: Đã từ chối }
        "404": { description: Không tìm thấy yêu cầu }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /customer-claim-request/{id}/revoke:
    patch:
      tags: [Customer Claim Request]
      summary: Thu hồi quyết định (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200": { description: Đã thu hồi }
        "404": { description: Không tìm thấy yêu cầu }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
