paths:
  /department/getAll:
    get:
      tags: [Department]
      summary: Danh sách phòng ban (HRM)
      parameters:
        - { in: query, name: flat, schema: { type: boolean }, description: "Trả phẳng thay vì cây" }
        - { in: query, name: leaf_only, schema: { type: boolean } }
      responses:
        "200": { description: Danh sách phòng ban }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /department/getAllPositions:
    get:
      tags: [Department]
      summary: Danh sách vị trí
      responses:
        "200": { description: Danh sách vị trí }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /department/createDepartment:
    post:
      tags: [Department]
      summary: Tạo phòng ban (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [department_name, department_code]
              properties:
                department_name: { type: string }
                department_code: { type: string }
                description: { type: string }
                type: { type: string, enum: [department, branch], description: "branch = TTKD" }
                address: { type: string }
                parent_id: { type: string }
      responses:
        "201": { description: Tạo phòng ban thành công }
        "400": { description: Dữ liệu không hợp lệ }
        "409": { description: Mã phòng ban đã tồn tại }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /department/createPosition:
    post:
      tags: [Department]
      summary: Tạo vị trí (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [position_name]
              properties:
                position_name: { type: string }
                description: { type: string }
      responses:
        "201": { description: Tạo vị trí thành công }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /department/update/{id}:
    put:
      tags: [Department]
      summary: Cập nhật phòng ban (admin)
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                department_name: { type: string }
                description: { type: string }
                type: { type: string, enum: [department, branch] }
                address: { type: string }
                parent_id: { type: string }
      responses:
        "200": { description: Cập nhật thành công }
        "400": { $ref: "#/components/responses/InvalidId" }
        "404": { $ref: "#/components/responses/NotFound" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /department/updatePosition/{id}:
    put:
      tags: [Department]
      summary: Cập nhật vị trí (admin)
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                position_name: { type: string }
                description: { type: string }
      responses:
        "200": { description: Cập nhật thành công }
        "400": { $ref: "#/components/responses/InvalidId" }
        "404": { $ref: "#/components/responses/NotFound" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /department/delete/{id}:
    delete:
      tags: [Department]
      summary: Xóa phòng ban (admin)
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      responses:
        "200": { description: Xóa thành công }
        "400": { $ref: "#/components/responses/InvalidId" }
        "404": { $ref: "#/components/responses/NotFound" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /department/deletePosition/{id}:
    delete:
      tags: [Department]
      summary: Xóa vị trí (admin)
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      responses:
        "200": { description: Xóa thành công }
        "400": { $ref: "#/components/responses/InvalidId" }
        "404": { $ref: "#/components/responses/NotFound" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
