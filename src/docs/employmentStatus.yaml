paths:
  /employment-status:
    get:
      tags: [Employment Status]
      summary: Danh sách trạng thái lao động
      responses:
        "200": { description: Danh sách }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      tags: [Employment Status]
      summary: Tạo trạng thái lao động (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, code]
              properties:
                name: { type: string }
                code: { type: string }
                accrues_annual_leave: { type: boolean }
                can_use_annual_leave: { type: boolean }
                retroactive_on_promote: { type: boolean }
      responses:
        "201": { description: Tạo thành công }
        "400": { description: name và code là bắt buộc }
        "409": { description: Code đã tồn tại }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /employment-status/{id}:
    patch:
      tags: [Employment Status]
      summary: Cập nhật trạng thái lao động (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                accrues_annual_leave: { type: boolean }
                can_use_annual_leave: { type: boolean }
                retroactive_on_promote: { type: boolean }
                isActive: { type: boolean }
      responses:
        "200": { description: Cập nhật thành công }
        "404": { description: Không tìm thấy }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    delete:
      tags: [Employment Status]
      summary: Xóa trạng thái lao động (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200": { description: Xóa thành công }
        "404": { description: Không tìm thấy }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
