paths:
  /print/status:
    get:
      tags: [Print]
      summary: Trạng thái hệ thống in
      responses:
        "200": { description: Trạng thái máy in }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /print:
    post:
      tags: [Print]
      summary: Gửi lệnh in 1 file
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file: { type: string, format: binary }
                copies: { type: integer, default: 1 }
                duplex: { type: string }
                paperSize: { type: string, example: A4 }
                orientation: { type: string, enum: [portrait, landscape] }
                pageRange: { type: string, example: "1-5" }
                fitToPage: { type: boolean }
                jobName: { type: string }
      responses:
        "200": { description: Đã gửi lệnh in }
        "400": { description: Vui lòng chọn file để in }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /print/history:
    get:
      tags: [Print]
      summary: Lịch sử in
      parameters:
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 20, maximum: 50 }
      responses:
        "200": { description: Lịch sử in (phân trang) }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /print/stats:
    get:
      tags: [Print]
      summary: Thống kê in
      responses:
        "200": { description: Thống kê in }
        "401": { $ref: "#/components/responses/Unauthorized" }
