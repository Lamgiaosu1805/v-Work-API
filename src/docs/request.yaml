paths:
  /requests/eligible-reviewers:
    get:
      tags: [Request]
      summary: Danh sách người có thể duyệt đơn
      responses:
        "200": { description: Danh sách người duyệt }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /requests:
    post:
      tags: [Request]
      summary: Tạo đơn từ
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [request_type, assigned_reviewer]
              properties:
                request_type: { type: string, description: "Loại đơn (nghỉ phép, điều chỉnh công...)" }
                assigned_reviewer: { type: string, description: "ID người duyệt" }
                reason: { type: string }
      responses:
        "201": { description: Tạo đơn thành công }
        "400": { description: Loại đơn / người duyệt không hợp lệ / chưa gán chi nhánh }
        "404": { description: Không tìm thấy thông tin nhân viên }
        "401": { $ref: "#/components/responses/Unauthorized" }
    get:
      tags: [Request]
      summary: Danh sách đơn (theo quyền duyệt)
      responses:
        "200": { description: Danh sách đơn }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /requests/my:
    get:
      tags: [Request]
      summary: Đơn của tôi
      responses:
        "200": { description: Danh sách đơn của tôi }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /requests/review/{id}:
    patch:
      tags: [Request]
      summary: Duyệt / từ chối đơn
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action]
              properties:
                action: { type: string, enum: [approve, reject] }
                reviewer_note: { type: string }
      responses:
        "200": { description: Đã xử lý đơn }
        "400": { description: ID không hợp lệ }
        "404": { description: Đơn không tồn tại }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /requests/cancel/{id}:
    patch:
      tags: [Request]
      summary: Hủy đơn (người tạo)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200": { description: Hủy đơn thành công }
        "400": { description: ID không hợp lệ }
        "403": { description: Không có quyền hủy đơn này }
        "404": { description: Đơn không tồn tại }
        "401": { $ref: "#/components/responses/Unauthorized" }
