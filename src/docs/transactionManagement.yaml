paths:
  /transaction-management:
    get:
      tags: [Transaction Management]
      summary: Danh sách giao dịch (CRM)
      parameters:
        - in: query
          name: category
          schema: { type: string }
        - in: query
          name: pageNumber
          schema: { type: integer, default: 1 }
        - in: query
          name: pageSize
          schema: { type: integer, default: 20 }
      responses:
        "200": { description: Danh sách giao dịch }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /transaction-management/recharge-customer:
    post:
      tags: [Transaction Management]
      summary: Tạo lệnh nạp tiền thủ công cho khách (CRM)
      parameters:
        - in: query
          name: crmUserName
          schema: { type: string }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [userId, amount]
              properties:
                userId: { type: string }
                amount: { type: number }
                file: { type: string, format: binary, description: "Chứng từ" }
      responses:
        "200": { description: Tạo lệnh nạp thành công }
        "422": { description: Dữ liệu không hợp lệ }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /transaction-management/recharge-customer/{id}:
    post:
      tags: [Transaction Management]
      summary: Gửi yêu cầu kế toán cho lệnh nạp (CRM)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
        - in: query
          name: crmUserName
          schema: { type: string }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [amount]
              properties:
                amount: { type: number }
                file: { type: string, format: binary }
      responses:
        "200": { description: Gửi yêu cầu thành công }
        "422": { description: Dữ liệu không hợp lệ }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /transaction-management/customer-deposits:
    get:
      tags: [Transaction Management]
      summary: Danh sách giao dịch nạp của khách (CRM)
      parameters:
        - in: query
          name: externalId
          schema: { type: string }
        - in: query
          name: category
          schema: { type: string }
        - in: query
          name: pageNumber
          schema: { type: integer, default: 1 }
        - in: query
          name: pageSize
          schema: { type: integer, default: 20 }
      responses:
        "200": { description: Danh sách giao dịch nạp }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
