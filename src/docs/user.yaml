paths:
  /user/getUsers:
    get:
      tags: [User]
      summary: Danh sách nhân viên
      parameters:
        - { in: query, name: page, schema: { type: integer, default: 1 } }
        - { in: query, name: limit, schema: { type: integer, default: 20 } }
        - { in: query, name: search, schema: { type: string } }
        - { in: query, name: employment_type, schema: { type: string } }
        - { in: query, name: department_id, schema: { type: string } }
        - { in: query, name: from_date, schema: { type: string, format: date } }
        - { in: query, name: to_date, schema: { type: string, format: date } }
        - { in: query, name: module, schema: { type: string } }
      responses:
        "200": { description: Danh sách nhân viên (phân trang) }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /user/getUserInfo:
    get:
      tags: [User]
      summary: Thông tin tài khoản đang đăng nhập
      responses:
        "200": { description: Thông tin user }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /user/getQRSale:
    get:
      tags: [User]
      summary: QR cá nhân của sale
      responses:
        "200": { description: QR code }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /user/getUserById/{id}:
    get:
      tags: [User]
      summary: Chi tiết nhân viên theo id
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      responses:
        "200": { description: Chi tiết nhân viên }
        "400": { $ref: "#/components/responses/InvalidId" }
        "404": { $ref: "#/components/responses/NotFound" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /user/birthday/this-month:
    get:
      tags: [User]
      summary: Nhân viên sinh nhật trong tháng
      responses:
        "200": { description: Danh sách sinh nhật }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /user/profile/{accountId}:
    get:
      tags: [User]
      summary: Hồ sơ theo accountId
      parameters:
        - { in: path, name: accountId, required: true, schema: { type: string } }
      responses:
        "200": { description: Hồ sơ nhân viên }
        "400": { $ref: "#/components/responses/InvalidId" }
        "404": { $ref: "#/components/responses/NotFound" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /user/createUser:
    post:
      tags: [User]
      summary: Tạo nhân viên (manager HRM)
      description: multipart/form-data — kèm hồ sơ đính kèm. userDepartments & schedules truyền dạng JSON string.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [full_name]
              properties:
                full_name: { type: string }
                cccd: { type: string }
                phone_number: { type: string }
                sex: { type: string }
                date_of_birth: { type: string, format: date }
                address: { type: string }
                tinh_trang_hon_nhan: { type: string }
                employment_type: { type: string }
                branch_id: { type: string }
                employment_status: { type: string }
                userDepartments: { type: string, description: "JSON array" }
                schedules: { type: string, description: "JSON array" }
      responses:
        "201": { description: Tạo nhân viên thành công }
        "400": { description: Dữ liệu không hợp lệ }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /user/updateUser/{id}:
    put:
      tags: [User]
      summary: Cập nhật nhân viên (manager HRM)
      description: multipart/form-data — các field cập nhật optional.
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                full_name: { type: string }
                phone_number: { type: string }
                address: { type: string }
                userDepartments: { type: string, description: "JSON array" }
                schedules: { type: string, description: "JSON array" }
                deletedAttachments: { type: string, description: "JSON array" }
      responses:
        "200": { description: Cập nhật thành công }
        "400": { $ref: "#/components/responses/InvalidId" }
        "404": { $ref: "#/components/responses/NotFound" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /user/uploadAvatar:
    post:
      tags: [User]
      summary: Upload ảnh đại diện
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [avatar]
              properties:
                avatar: { type: string, format: binary }
      responses:
        "200": { description: Upload thành công }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /user/uploadCoverPhoto:
    post:
      tags: [User]
      summary: Upload ảnh bìa
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [cover_photo]
              properties:
                cover_photo: { type: string, format: binary }
      responses:
        "200": { description: Upload thành công }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /user/{id}/employment-status:
    patch:
      tags: [User]
      summary: Đặt trạng thái lao động cho nhân viên (admin)
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [employment_status_id]
              properties:
                employment_status_id: { type: string }
                effective_date: { type: string, format: date }
      responses:
        "200": { description: Cập nhật thành công }
        "400": { $ref: "#/components/responses/InvalidId" }
        "404": { $ref: "#/components/responses/NotFound" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
