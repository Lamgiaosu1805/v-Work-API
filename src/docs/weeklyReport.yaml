paths:
  /weekly-reports/my-dept:
    get:
      tags: [Weekly Report]
      summary: Trạng thái báo cáo tuần của phòng mình
      parameters:
        - { in: query, name: week, schema: { type: string, format: date }, description: "Tuần cần xem (mặc định tuần hiện tại)" }
      responses:
        "200": { description: Trạng thái báo cáo }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /weekly-reports/admin:
    get:
      tags: [Weekly Report]
      summary: Dashboard báo cáo tất cả phòng ban (manager workplace)
      parameters:
        - { in: query, name: week, schema: { type: string, format: date } }
      responses:
        "200": { description: Dashboard báo cáo (đủ tất cả phòng ban) }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /weekly-reports/{deptId}/history:
    get:
      tags: [Weekly Report]
      summary: Lịch sử báo cáo của 1 phòng ban
      parameters:
        - { in: path, name: deptId, required: true, schema: { type: string } }
        - { in: query, name: page, schema: { type: integer, default: 1 } }
        - { in: query, name: limit, schema: { type: integer, default: 10, maximum: 50 } }
      responses:
        "200": { description: Lịch sử báo cáo }
        "400": { $ref: "#/components/responses/InvalidId" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /weekly-reports/{deptId}/submit:
    post:
      tags: [Weekly Report]
      summary: Nộp / nộp lại báo cáo tuần
      parameters:
        - { in: path, name: deptId, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file: { type: string, format: binary }
                note: { type: string }
      responses:
        "200": { description: Nộp báo cáo thành công }
        "400": { $ref: "#/components/responses/InvalidId" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /weekly-reports/file/{reportId}/view:
    get:
      tags: [Weekly Report]
      summary: Xem file báo cáo
      parameters:
        - { in: path, name: reportId, required: true, schema: { type: string } }
      responses:
        "200": { description: Nội dung file }
        "400": { $ref: "#/components/responses/InvalidId" }
        "404": { $ref: "#/components/responses/NotFound" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /weekly-reports/file/{reportId}/download:
    get:
      tags: [Weekly Report]
      summary: Tải file báo cáo
      parameters:
        - { in: path, name: reportId, required: true, schema: { type: string } }
      responses:
        "200": { description: File tải về }
        "400": { $ref: "#/components/responses/InvalidId" }
        "404": { $ref: "#/components/responses/NotFound" }
        "401": { $ref: "#/components/responses/Unauthorized" }
